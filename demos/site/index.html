<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobile CC demos — v{{VERSION}}</title>
<style>
  :root {
    --bg: #0e1116; --fg: #d4d4d4; --muted: #8aa0a8;
    --accent: #4ec9b0; --border: #1f2630; --card-bg: #141a22;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px 16px; background: var(--bg); color: var(--fg);
         font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { max-width: 980px; margin: 0 auto 24px; }
  header h1 { color: var(--accent); margin: 0 0 6px; font-size: 28px; }
  header .sub { color: var(--muted); margin: 0; }
  main { max-width: 980px; margin: 0 auto; display: grid;
         grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
         gap: 20px; }
  .card { background: var(--card-bg); border: 1px solid var(--border);
          border-radius: 12px; overflow: hidden; color: inherit;
          text-decoration: none; transition: transform .12s, border-color .12s; }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .thumb { background: #000; aspect-ratio: 412/838; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .meta { padding: 14px 16px 16px; }
  .meta h3 { margin: 0 0 6px; font-size: 16px; }
  .meta p  { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
  .badges { display: flex; gap: 6px; margin-top: 8px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px;
           font-size: 11px; background: rgba(255,255,255,.06); color: var(--fg); }
  .badge-passed { background: rgba(78,201,176,.18); color: var(--accent); }
  .badge-failed { background: rgba(244,135,113,.18); color: #f48771; }
  footer { max-width: 980px; margin: 32px auto 0; color: var(--muted);
           font-size: 12px; text-align: center; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Mobile CC demos</h1>
  <p class="sub">{{COUNT}} workflow{{COUNT}}<span style="display:none"> -- noop</span> · version <code>{{VERSION}}</code></p>
</header>
<main>{{CARDS}}</main>
<footer>
  Generated by <code>mobile-cc/demos/runner/run-all.mjs</code>.
  Each workflow's <code>steps.json</code> doubles as a visual-regression
  test signal — failures block the release.
</footer>
</body>
</html>
