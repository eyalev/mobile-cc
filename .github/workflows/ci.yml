name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TTYVIEW_REPO: ttyview/ttyview
  TTYVIEW_REF: v0.2.1   # tab menu/recents/topics/savePins/hydrate-fix (match across workflows)
  # Pin the Rust toolchain so "green locally" == "green in CI". Clippy/rustfmt
  # lints are tied to the rustc version; an unpinned `stable` floats with the
  # runner image (it drifted to 1.96 and fired io_other_error while local was
  # 1.89). Bump this deliberately, in lockstep with the local toolchain.
  RUST_VERSION: '1.89.0'
  # Opt the JS-based actions (checkout, upload/download-artifact) into
  # Node 24 ahead of the GitHub-default flip (target: 2026-06-02).
  # Removable once the actions ship Node 24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: cargo build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout mobile-cc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: mobile-cc

      - name: Checkout ttyview (path-dep sibling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          ref: ${{ env.TTYVIEW_REF }}
          path: ttyview

      - name: Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # action @ 2026-05-11
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3  # v2.7.7
        with:
          workspaces: mobile-cc

      - name: cargo check
        working-directory: mobile-cc
        run: cargo check --release

      - name: cargo build
        working-directory: mobile-cc
        run: cargo build --release

      - name: cargo test
        working-directory: mobile-cc
        run: cargo test --release

      - name: smoke test (binary boots, --help works)
        working-directory: mobile-cc
        run: ./target/release/mobile-cc --help

      - name: Binary-size budget check (≤ 16 MB)
        working-directory: mobile-cc
        # Budget: 16 MB. Raised from 10 MB for v0.6.0 — Web Push (web-push +
        # hyper + jwt-simple), settings-search, and the perf/security work took
        # the binary from ~7.5 MB to ~11 MB. 16 MB leaves ~5 MB headroom. If we
        # cross 16 MB, investigate via the cargo-bloat summary below before
        # raising the bar.
        #
        # NOTE: must run BEFORE `cargo bloat` — bloat rebuilds without
        # `strip = "symbols"` so it can read debuginfo, which inflates
        # the on-disk binary by ~6 MB. We measure the actual shipped
        # artifact here, then let bloat run for its summary.
        run: |
          BUDGET=16777216   # 16 * 1024 * 1024
          actual=$(stat -c '%s' target/release/mobile-cc)
          actual_h=$(stat -c '%s' target/release/mobile-cc | numfmt --to=iec)
          budget_h="$(echo "$BUDGET" | numfmt --to=iec)"
          echo "binary: $actual bytes ($actual_h)   budget: $BUDGET bytes ($budget_h)"
          {
            echo "## Binary size — \`mobile-cc\` release build"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Binary size | $actual_h ($actual bytes) |"
            echo "| Budget | $budget_h ($BUDGET bytes) |"
            echo "| Headroom | $(( (BUDGET - actual) / 1024 / 1024 )) MiB |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$actual" -gt "$BUDGET" ]; then
            echo "::error::mobile-cc binary $actual_h exceeds $budget_h budget"
            exit 1
          fi

      - name: Install cargo-bloat
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8  # v2.77.6
        with:
          tool: cargo-bloat

      - name: cargo bloat (top dep contributors)
        working-directory: mobile-cc
        # Emits the top 20 crates by bloat to the CI summary. Use this
        # to spot accidental dep churn — a 2 MB jump from a single crate
        # is the signal we look for. cargo-bloat rebuilds with debuginfo,
        # so the on-disk binary AFTER this step is larger than what we
        # actually ship — don't run any size check on it.
        run: |
          {
            echo ""
            echo '<details><summary>Top 20 crates by bloat (release, with debuginfo)</summary>'
            echo ""
            echo '```'
            cargo bloat --release --crates -n 20
            echo '```'
            echo ""
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: clippy + fmt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout mobile-cc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: mobile-cc

      - name: Checkout ttyview (path-dep sibling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          ref: ${{ env.TTYVIEW_REF }}
          path: ttyview

      - name: Rust toolchain (pinned + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # action @ 2026-05-11
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3  # v2.7.7
        with:
          workspaces: mobile-cc

      - name: cargo fmt --check
        working-directory: mobile-cc
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: mobile-cc
        run: cargo clippy --release --all-targets -- -D warnings

  audit:
    name: cargo audit + deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout mobile-cc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: mobile-cc

      - name: Checkout ttyview (path-dep sibling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          ref: ${{ env.TTYVIEW_REF }}
          path: ttyview

      - name: Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # action @ 2026-05-11
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit + cargo-deny
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8  # v2.77.6
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit
        working-directory: mobile-cc
        # --deny warnings makes unmaintained advisories fail too (not just
        # vulnerabilities). Ignored IDs match what deny.toml ignores —
        # the two tools have overlapping but slightly different ranges, so
        # we mirror the same list.
        # RUSTSEC-2023-0071 (rsa Marvin Attack) — no fix available; rsa is a
        # transitive dep of web-push via jwt-simple's RS256 support, which we do
        # NOT use (VAPID is ES256/ECDH, no RSA decryption of attacker input), so
        # the timing sidechannel is not on a reachable path. Ships as
        # EXPERIMENTAL Web Push; revisit if an rsa fix lands.
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2023-0071

      - name: cargo deny check
        working-directory: mobile-cc
        run: cargo deny check

  ttyview-ref-freshness:
    name: ttyview ref freshness (warn-only)
    runs-on: ubuntu-22.04
    # Informational only — NEVER fails the build. mobile-cc pins ttyview via
    # TTYVIEW_REF; that pin silently lagged ttyview HEAD by 15 commits before
    # the v0.5.0 release. This surfaces the drift as a warning + step summary
    # so a stale pin is visible on every run instead of discovered at release.
    steps:
      - name: Checkout ttyview (full history + tags)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          path: ttyview
          fetch-depth: 0

      - name: Warn if TTYVIEW_REF lags ttyview HEAD
        working-directory: ttyview
        env:
          REF: ${{ env.TTYVIEW_REF }}
          MAX_LAG: '10'
        run: |
          set -uo pipefail
          # Make sure the pinned ref (tag or branch) AND the default-branch tip
          # are both present locally, regardless of what checkout fetched.
          git fetch --tags --quiet origin || true
          DEF="$(git remote show origin 2>/dev/null | sed -n 's/.*HEAD branch: //p')"
          DEF="${DEF:-main}"
          git fetch --quiet origin "${DEF}" || true
          if ! git rev-parse -q --verify "${REF}^{commit}" >/dev/null; then
            echo "::warning title=ttyview pin unresolved::TTYVIEW_REF '${REF}' not found in ${TTYVIEW_REPO:-ttyview} — cannot compute lag."
            exit 0
          fi
          behind="$(git rev-list --count "${REF}..FETCH_HEAD" 2>/dev/null || echo 0)"
          ref_sha="$(git rev-parse --short "${REF}^{commit}")"
          head_sha="$(git rev-parse --short FETCH_HEAD 2>/dev/null || echo '?')"
          echo "TTYVIEW_REF=${REF} (${ref_sha}); ttyview ${DEF} HEAD=${head_sha}; behind by ${behind} commit(s) (threshold ${MAX_LAG})."
          {
            echo "## ttyview ref freshness"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Pinned \`TTYVIEW_REF\` | \`${REF}\` (\`${ref_sha}\`) |"
            echo "| ttyview \`${DEF}\` HEAD | \`${head_sha}\` |"
            echo "| Behind by | **${behind}** commit(s) |"
            echo "| Warn threshold | ${MAX_LAG} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${behind}" -gt "${MAX_LAG}" ]; then
            echo "::warning title=ttyview pin stale::TTYVIEW_REF ${REF} lags ttyview ${DEF} by ${behind} commits (> ${MAX_LAG}). Consider bumping the pin."
          fi
