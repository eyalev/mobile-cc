name: Release dry-run

# Exercises the release PACKAGING + SIGNING chain (build → package → sha256 →
# minisign → attest) WITHOUT cutting a real release, so environment drift is
# caught proactively instead of on the next real tag.
#
# Motivation: the minisign step in release.yml broke on the FIRST real release
# (`apt-get install minisign` → "Unable to locate package") and was only
# discovered then. Anything in the sign/package path that depends on the runner
# environment (apt contents, the minisign static-binary URL, shasum tooling)
# can rot silently between releases. This job runs that exact path on a
# schedule + on demand so breakage shows up on a Monday, not mid-release.
#
# Scope: builds ONE target (x86_64 linux) — the packaging/signing logic is
# target-agnostic, so a single arch is enough signal. Uses a THROWAWAY minisign
# keypair generated in-job (no secret), and VERIFIES the signature it produces,
# so the full fetch → sign → verify path is proven end to end.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC

permissions:
  contents: read
  id-token: write       # attest-build-provenance (keyless OIDC)
  attestations: write

env:
  TTYVIEW_REPO: ttyview/ttyview
  TTYVIEW_REF: v0.2.0   # keep in sync with ci.yml / release.yml / macos-smoke.yml
  RUST_VERSION: '1.89.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dryrun:
    name: release packaging + signing dry-run
    runs-on: ubuntu-22.04
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout mobile-cc
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: mobile-cc

      - name: Checkout ttyview (path-dep sibling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          ref: ${{ env.TTYVIEW_REF }}
          path: ttyview

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # action @ 2026-05-11
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.TARGET }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3  # v2.7.7
        with:
          workspaces: mobile-cc
          key: dryrun-${{ env.TARGET }}-ttyview-${{ env.TTYVIEW_REF }}

      - name: Build
        working-directory: mobile-cc
        run: cargo build --release --target "${TARGET}" --bin mobile-cc

      - name: Package + sha256 (mirrors release.yml)
        shell: bash
        working-directory: mobile-cc
        run: |
          set -euo pipefail
          BIN_NAME=mobile-cc
          STAGING="${BIN_NAME}-dryrun-${TARGET}"
          ARCHIVE="${BIN_NAME}-${TARGET}.tar.gz"
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/${BIN_NAME}" "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar -czf "$ARCHIVE" "$STAGING"
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          # Verify the digest we just wrote (round-trips the sha tooling).
          shasum -a 256 -c "${ARCHIVE}.sha256"
          ls -la "$ARCHIVE" "${ARCHIVE}.sha256"

      - name: minisign sign + verify (throwaway key — exercises the static-binary fetch)
        shell: bash
        working-directory: mobile-cc
        run: |
          set -euo pipefail
          ARCHIVE="mobile-cc-${TARGET}.tar.gz"
          # SAME fetch path as release.yml — this is the step that broke on the
          # first real release (apt had no `minisign`).
          curl -fsSL -o /tmp/minisign.tgz \
            https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz
          mkdir -p /tmp/ms && tar -xzf /tmp/minisign.tgz -C /tmp/ms
          MINISIGN="$(find /tmp/ms -type f -name minisign -path '*x86_64*' | head -1)"
          chmod +x "$MINISIGN"
          "$MINISIGN" -v
          # Throwaway passwordless keypair (-W) — no secret needed for a dry-run.
          umask 077
          "$MINISIGN" -G -p /tmp/dryrun.pub -s /tmp/dryrun.key -W < /dev/null
          "$MINISIGN" -Sm "$ARCHIVE" -s /tmp/dryrun.key < /dev/null
          # Prove the signature verifies against its pubkey — the full chain.
          "$MINISIGN" -Vm "$ARCHIVE" -p /tmp/dryrun.pub
          echo "minisign sign+verify OK -> ${ARCHIVE}.minisig"
          rm -f /tmp/dryrun.key

      - name: Attest build provenance (dry-run artifact)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: 'mobile-cc/mobile-cc-${{ env.TARGET }}.tar.gz'

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release dry-run"
            echo ""
            echo "Exercised the release packaging + signing chain on \`${TARGET}\`:"
            echo ""
            echo "- ✅ build → package → \`shasum -a 256\` (write + \`-c\` verify)"
            echo "- ✅ minisign static-binary fetch → throwaway keygen → sign → **verify**"
            echo "- ✅ attest-build-provenance"
            echo ""
            echo "No real tag cut; no prod signing key used."
          } >> "$GITHUB_STEP_SUMMARY"
