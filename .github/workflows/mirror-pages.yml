name: Mirror release to Pages

# Runs after a `release.yml` workflow finishes on a tag push. Downloads
# the just-published release tarballs + their .sha256 siblings, lays
# them out as `v$VERSION/<asset>` plus updates `latest.txt`, then deploys
# the result to Cloudflare Pages.
#
# Replaces the manual sequence we ran by hand for v0.1.0 .. v0.1.3:
#   gh release download $TAG -D /tmp/mobile-cc-pages/$TAG/
#   echo $TAG > /tmp/mobile-cc-pages/latest.txt
#   wrangler pages deploy /tmp/mobile-cc-pages --project-name=mobile-cc
#
# Required repo secrets (settings → secrets and variables → actions):
#   CLOUDFLARE_API_TOKEN   — token scoped to Account.Cloudflare Pages:Edit
#                            (https://dash.cloudflare.com/profile/api-tokens)
#   CLOUDFLARE_ACCOUNT_ID  — your account ID (visible on the dashboard
#                            sidebar; 32-char hex). The current account
#                            ID for this project is 0ca98ec4dc365fc46ca9acc3d1c26e86.
#
# To bootstrap: create the API token via Cloudflare dashboard with the
# template "Cloudflare Pages: Edit"; add both secrets in this repo's
# settings. Until both secrets exist, this workflow is a no-op on tag
# push (the auth step fails fast, doesn't poison subsequent runs).

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to mirror (e.g. v0.1.3); omit to mirror latest'
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PAGES_PROJECT: mobile-cc

jobs:
  mirror:
    name: download + deploy
    runs-on: ubuntu-22.04
    # Only run if the release workflow succeeded AND it was a tag push.
    # (workflow_run fires on every completion regardless of conclusion.)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout (for staging dir)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Resolve target tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Mirroring release: $TAG"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p staging/$TAG
          gh release download "$TAG" -R "${{ github.repository }}" \
            -D "staging/$TAG/" --clobber
          # latest.txt is always overwritten — last release wins.
          echo "$TAG" > staging/latest.txt
          # Include the current install.sh + landing index.html so the
          # mirror is self-contained even on a clean Pages project.
          cp install.sh staging/
          if [ -f public/index.html ]; then
            cp public/index.html staging/index.html
          fi
          ls -la staging/ "staging/$TAG/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages deploy staging --project-name=${{ env.PAGES_PROJECT }}
                                  --branch=main --commit-dirty=true

      - name: Smoke check (apex serves new latest.txt)
        run: |
          set -euo pipefail
          sleep 5
          # The apex resolves via CNAME → pages.dev. Either should work.
          for url in "https://mobile-cc.dev/latest.txt" \
                     "https://${{ env.PAGES_PROJECT }}.pages.dev/latest.txt"; do
            actual=$(curl -fsS --max-time 10 "$url" | tr -d '[:space:]')
            echo "$url → $actual"
            if [ "$actual" = "${{ steps.tag.outputs.tag }}" ]; then
              echo "✓ $url serves expected tag"
              exit 0
            fi
          done
          echo "::warning::neither URL serves the expected tag yet (Cloudflare propagation delay)"
