name: Demos

# Consistency gate for the demos-as-tests system (demos/CONVENTIONS.md).
# This does NOT capture video — capturing needs a live daemon + browsers and
# runs locally via `demos/run.sh`. CI instead asserts the system stays
# internally consistent and that committed media meets the resolution floor,
# which is what catches the "blurry use.mp4" class of regression.

on:
  push:
    branches: [main]
    paths:
      - 'demos/**'
      - 'docs/media/**'
      - 'README.md'
      - '.github/workflows/demos.yml'
  pull_request:
    paths:
      - 'demos/**'
      - 'docs/media/**'
      - 'README.md'
      - '.github/workflows/demos.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install ffmpeg (for ffprobe resolution check)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Demos consistency check
        run: node demos/check.mjs
