name: Release

# Builds release binaries on tag push (vX.Y.Z) for Linux x86_64,
# Linux aarch64, macOS x86_64, and macOS aarch64. Uploads them to
# a GitHub Release.
#
# mobile-cc consumes `ttyview-core` as a path dependency at
# ../ttyview/crates/ttyview-core, so this workflow checks out the
# ttyview repo alongside before building. Pin the ttyview ref with
# the TTYVIEW_REF environment variable below.
#
# Linux targets build on ubuntu-22.04 (glibc 2.35) so the binaries
# run on Debian 12 bookworm (2.36) and later distros — cross-rs is
# avoided because its Docker container can't see the sibling ttyview
# checkout that Cargo needs for the path dependency.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  TTYVIEW_REPO: ttyview/ttyview
  TTYVIEW_REF: v0.1.1   # pinned for reproducible releases

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross_linker: aarch64-linux-gnu-gcc
            apt_pkgs: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - name: Checkout mobile-cc
        uses: actions/checkout@v4
        with:
          path: mobile-cc

      - name: Checkout ttyview (path-dep sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TTYVIEW_REPO }}
          ref: ${{ env.TTYVIEW_REF }}
          path: ttyview

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile-cc
          key: release-${{ matrix.target }}-ttyview-${{ env.TTYVIEW_REF }}

      - name: Install cross-compile toolchain (linux aarch64)
        if: matrix.apt_pkgs != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_pkgs }}

      - name: Build
        working-directory: mobile-cc
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
        run: cargo build --release --target ${{ matrix.target }} --bin mobile-cc

      - name: Package
        shell: bash
        working-directory: mobile-cc
        run: |
          set -euo pipefail
          BIN_NAME=mobile-cc
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          STAGING="${BIN_NAME}-${REF_NAME}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          ls -la "${STAGING}.tar.gz" "${STAGING}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-cc-${{ matrix.target }}
          path: |
            mobile-cc/mobile-cc-*.tar.gz
            mobile-cc/mobile-cc-*.tar.gz.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mobile-cc-*.tar.gz
            artifacts/mobile-cc-*.tar.gz.sha256
          generate_release_notes: true
