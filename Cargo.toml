[package]
name = "mobile-cc"
version = "0.3.1"
edition = "2021"
license = "MIT"
description = "Drive Claude Code from your phone. Mobile-focused packaging of ttyview-core."
repository = "https://github.com/eyalev/mobile-cc"
homepage = "https://mobile-cc.dev"
authors = ["Eyal Levin <eyalev@gmail.com>"]
keywords = ["claude", "mobile", "tmux", "terminal", "agent"]
categories = ["command-line-utilities"]

[[bin]]
name = "mobile-cc"
path = "src/main.rs"

[dependencies]
# Path-dep during ttyview-core's pre-publish phase. The `version` is the
# constraint cargo would enforce if/when ttyview-core lands on crates.io;
# it also lets cargo-deny's wildcard check pass.
# `^0.1.1` (caret) matches all 0.1.x — the v0.1.2 ttyview tag is built
# from pre-bump source where ttyview-core's package version is still
# 0.1.1, so we stay on the looser constraint.
ttyview-core = { path = "../ttyview/crates/ttyview-core", version = "0.1.5" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
dirs = "5"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
